<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Europa Wanderkarte – Prototyp</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="panel">
      <h1>Europa Wanderkarte</h1>
      <p class="subtle">Interaktive Übersichtskarte für Wanderrouten, Schutzhütten und Wildcamping-Regeln in Europa.</p>

      <div class="controls">
        <label class="control">
          <span>Route suchen</span>
          <input id="routeSearch" type="text" placeholder="z. B. Kungsleden" />
        </label>

        <div class="toggles">
          <label><input id="toggleRoutes" type="checkbox" checked /> Routen</label>
          <label><input id="toggleShelters" type="checkbox" checked /> Schutzhütten</label>
          <label><input id="toggleWildcamping" type="checkbox" checked /> Wildcamping</label>
        </div>
      </div>

      <div class="legend">
        <h2>Legende</h2>
        <div class="legend-row"><span class="swatch route"></span> Wanderroute</div>
        <div class="legend-row"><span class="swatch shelter"></span> Schutzhütte</div>
        <div class="legend-row"><span class="swatch allowed"></span> Wildcamping erlaubt</div>
        <div class="legend-row"><span class="swatch restricted"></span> Nur eingeschränkt / markierte Gebiete</div>
        <div class="legend-row"><span class="swatch forbidden"></span> Wildcamping verboten</div>
      </div>
    </div>

    <div class="panel list-panel">
      <div class="list-header">
        <h2>Routen</h2>
        <span id="routeCount">0</span>
      </div>
      <div id="routeList" class="route-list"></div>
    </div>
  </aside>

  <main class="map-wrap">
    <div class="overlay-doc-buttons">
      <button id="openSources" class="doc-btn" type="button">Datenquellen</button>
      <button id="openWorkflow" class="doc-btn" type="button">Workflow</button>
    </div>

    <div id="map"></div>
    <div id="statusBanner" class="status-banner">Lade Daten…</div>

    <div id="docOverlay" class="doc-overlay hidden" aria-hidden="true">
      <div id="closeDocOverlay" class="doc-overlay-backdrop"></div>
      <div class="doc-overlay-panel">
        <div class="doc-overlay-header">
          <h2 id="docOverlayTitle">Dokumentation</h2>
          <button id="docOverlayCloseBtn" class="doc-close-btn" type="button">×</button>
        </div>
        <div id="docOverlayContent" class="doc-overlay-content"></div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="./app.js"></script>
</body>
</html>
